<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Crislzy's</title>
        
        <meta charset="UTF-8">

        <link rel="stylesheet" type="text/css" href="/styles/main.css?v=0.3">
        <link href="/assets/favicon.ico" rel="icon" type="image/x-icon" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="description" content="Crislzy's portfolio website! Check it out :3">
        <meta name="keywords" content="personal site, cris, crislzy, portfolio">
        <meta name="theme-color" content="#ffffff">
        <meta name="author" content="Crislzy">

        <meta name="robots" content="noai, noimageai">
        <meta name="googlebot" content="noimageai">

        <meta property="og:site_name" content="crislzy presents:">
        <meta property="og:title" content="crislzy's portfolio">
        <meta property="og:description" content="my portfolio! come check it out! :3">
        <meta property="og:url" content="https://portfolio.crislzy.xyz">
        <meta property="og:image" content="https://portfolio.crislzy.xyz/assets/previews/main.png">

        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="crislzy's portfolio">
        <meta name="twitter:description" content="my portfolio! come check it out! :3">
        <meta name="twitter:image" content="https://portfolio.crislzy.xyz/assets/previews/main.png">
    </head>
    <body>
        
        <div class="main-container">
            <nav class="navbar" id="navbar">
                <!-- Loaded by js-->
            </nav>
            <main>
                <div class="projects" id="projects">
                    <!-- Loaded by js from json-->
                </div>
            </main>
            <footer>
                <p>© 2026 crislzy.xyz</p>
                <p id="footer-random"></p>
            </footer>
        </div>
        <script src="/js/global.js" defer></script>
        <script src="/js/oneko.js"></script>
        <script defer>
            async function load() {
                const response = await fetch("/data/projects.json");
                const projects = await response.json();
                const container = document.getElementById("projects");

                projects.forEach(project => {
                    const div = document.createElement("div");
                    div.className = "project";
                    div.innerHTML = `
                    <h3>${project.title}</h3>
                    <p>${project.description}</p>
                    `;
                    div.onclick = () => {
                        redirect(project.id);
                    };
                    container.appendChild(div);
                });
            }
            load();
        </script>
    </body>
</html>
