    <body>
        
        <div class="main-container">
            <nav class="navbar" id="navbar">
                <!-- Loaded by js-->
            </nav>
            <main>
                <h1>Contact me :)</h1>
                <p>You can reach me through:</p>
                <ul>
                    <li>Email: <a href="mailto:me@crislzy.xyz">me@crislzy.xyz</a></li>
                    <li>Discord: <a href="https://discord.com/users/920617892444258305" target="_blank" rel="noopener noreferrer me">Cris (@crislzy)</a></li>
                    <li>Github: <a href="https://github.com/crislazy" target="_blank" rel="noopener noreferrer me">Crislzy (@crislazy)</a></li>
                    <li>HackClub Slack: <a href="https://hackclub.enterprise.slack.com/team/U09TNMQ9MCZ" target="_blank" rel="noopener noreferrer me">CrisLzy</a></li>
                    <li>Or send me an annonymous message:</li>
                </ul>
                <form id="msgForm" onsubmit="return false;">
                    <label for="name">Name:</label><br>
                    <input type="text" id="name" name="name" placeholder="Anonymous"><br>
                    <label for="msg">Message:</label><br>
                    <input type="text" id="msg" name="msg" placeholder="Your message here..."> 
                    <input type="submit" value="Submit">
                </form>
                <script is:inline>
                const form = document.getElementById("msgForm");

                form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const author = document.getElementById("name").value || "Anonymous";
                const message = document.getElementById("msg").value;

                if (!message) {
                alert("Please enter a message before sending!");
                return;
                }

                await fetch("https://crisapis.vercel.app/api/discordMessage", {
                    method: "POST",
                    headers: {
                    "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                    author: author,
                    message: message
                    })
                });

                form.reset();
                });
                </script>
            </main>
            <footer>
                <p>© 2026 crislzy.xyz</p>
                <p id="footer-random"></p>
            </footer>

        <style>
            form {
                margin-left: 25px;
